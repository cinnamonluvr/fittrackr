                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path>
                </svg>
                <span class="text-xs">Fitness</span>

                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 pb-24 md:pb-8" id="main-content">
    </main>

    <script>
        // Food Database
        const foodDatabase = [
            { name: 'Chicken Breast', category: 'Protein', calories: 165, protein: 31, carbs: 0, fats: 3.6, servingSize: '100g' },
            { name: 'Salmon', category: 'Protein', calories: 208, protein: 20, carbs: 0, fats: 13, servingSize: '100g' },
            { name: 'Eggs', category: 'Protein', calories: 155, protein: 13, carbs: 1.1, fats: 11, servingSize: '2 large' },
            { name: 'Ground Beef', category: 'Protein', calories: 176, protein: 20, carbs: 0, fats: 10, servingSize: '100g' },
            { name: 'Tuna', category: 'Protein', calories: 132, protein: 28, carbs: 0, fats: 1.3, servingSize: '100g' },
            { name: 'Greek Yogurt', category: 'Protein', calories: 97, protein: 10, carbs: 3.6, fats: 5, servingSize: '170g' },
            { name: 'Tofu', category: 'Protein', calories: 144, protein: 17, carbs: 3, fats: 9, servingSize: '100g' },
            { name: 'Brown Rice', category: 'Carbs', calories: 216, protein: 5, carbs: 45, fats: 1.8, servingSize: '1 cup cooked' },
            { name: 'Quinoa', category: 'Carbs', calories: 222, protein: 8, carbs: 39, fats: 3.6, servingSize: '1 cup cooked' },
            { name: 'Oatmeal', category: 'Carbs', calories: 154, protein: 6, carbs: 27, fats: 3, servingSize: '1 cup cooked' },
            { name: 'Sweet Potato', category: 'Carbs', calories: 180, protein: 4, carbs: 41, fats: 0.3, servingSize: '1 medium' },
            { name: 'Whole Wheat Bread', category: 'Carbs', calories: 140, protein: 6, carbs: 24, fats: 2, servingSize: '2 slices' },
            { name: 'Pasta', category: 'Carbs', calories: 220, protein: 8, carbs: 43, fats: 1.3, servingSize: '1 cup cooked' },
            { name: 'Banana', category: 'Carbs', calories: 105, protein: 1.3, carbs: 27, fats: 0.4, servingSize: '1 medium' },
            { name: 'Broccoli', category: 'Vegetables', calories: 55, protein: 3.7, carbs: 11, fats: 0.6, servingSize: '1 cup cooked' },
            { name: 'Spinach', category: 'Vegetables', calories: 41, protein: 5, carbs: 6.8, fats: 0.5, servingSize: '1 cup cooked' },
            { name: 'Carrots', category: 'Vegetables', calories: 52, protein: 1.2, carbs: 12, fats: 0.3, servingSize: '1 cup raw' },
            { name: 'Avocado', category: 'Fats', calories: 234, protein: 3, carbs: 12, fats: 21, servingSize: '1 medium' },
            { name: 'Almonds', category: 'Fats', calories: 164, protein: 6, carbs: 6, fats: 14, servingSize: '28g' },
            { name: 'Peanut Butter', category: 'Fats', calories: 188, protein: 8, carbs: 7, fats: 16, servingSize: '2 tbsp' },
            { name: 'Olive Oil', category: 'Fats', calories: 119, protein: 0, carbs: 0, fats: 13.5, servingSize: '1 tbsp' },
            { name: 'Milk', category: 'Dairy', calories: 122, protein: 8, carbs: 12, fats: 5, servingSize: '1 cup' },
            { name: 'Cheese', category: 'Dairy', calories: 114, protein: 7, carbs: 0.4, fats: 9.4, servingSize: '28g' },
            { name: 'Apple', category: 'Fruits', calories: 95, protein: 0.5, carbs: 25, fats: 0.3, servingSize: '1 medium' },
            { name: 'Orange', category: 'Fruits', calories: 62, protein: 1.2, carbs: 15, fats: 0.2, servingSize: '1 medium' },
            { name: 'Protein Shake', category: 'Supplements', calories: 120, protein: 25, carbs: 3, fats: 1, servingSize: '1 scoop' },
        ];

        const storage = {
            getProfile() {
                const data = localStorage.getItem('fitness_app_profile');
                return data ? JSON.parse(data) : null;
            },
            saveProfile(profile) {
                localStorage.setItem('fitness_app_profile', JSON.stringify(profile));
            },
            getFoodLogs() {
                const data = localStorage.getItem('fitness_app_food_logs');
                return data ? JSON.parse(data) : [];
            },
            saveFoodLogs(logs) {
                localStorage.setItem('fitness_app_food_logs', JSON.stringify(logs));
            },
            getTodayLog() {
                const logs = this.getFoodLogs();
                const today = new Date().toISOString().split('T')[0];
                return logs.find(log => log.date === today) || null;
            },
            addFoodEntry(food) {
                const logs = this.getFoodLogs();
                const today = new Date().toISOString().split('T')[0];
                const todayLog = logs.find(log => log.date === today);
                
                const newFood = {
                    ...food,
                    id: Date.now().toString(),
                };

                if (todayLog) {
                    todayLog.foods.push(newFood);
                    todayLog.totalCalories += newFood.calories;
                    todayLog.totalProtein += newFood.protein;
                    todayLog.totalCarbs += newFood.carbs;
                    todayLog.totalFats += newFood.fats;
                } else {
                    logs.push({
                        date: today,
                        foods: [newFood],
                        totalCalories: newFood.calories,
                        totalProtein: newFood.protein,
                        totalCarbs: newFood.carbs,
                        totalFats: newFood.fats,
                    });
                }
                this.saveFoodLogs(logs);
            },
            deleteFoodEntry(foodId) {
                const logs = this.getFoodLogs();
                const today = new Date().toISOString().split('T')[0];
                const dayLog = logs.find(log => log.date === today);
                
                if (dayLog) {
                    const foodIndex = dayLog.foods.findIndex(f => f.id === foodId);
                    if (foodIndex !== -1) {
                        const food = dayLog.foods[foodIndex];
                        dayLog.totalCalories -= food.calories;
                        dayLog.totalProtein -= food.protein;
                        dayLog.totalCarbs -= food.carbs;
                        dayLog.totalFats -= food.fats;
                        dayLog.foods.splice(foodIndex, 1);
                    }
                    this.saveFoodLogs(logs);
                }
            }
        };

        function calculateBMR(profile) {
            const { currentWeight, height, age, gender } = profile;
            if (gender === 'male') {
                return 10 * currentWeight + 6.25 * height - 5 * age + 5;
            } else {
                return 10 * currentWeight + 6.25 * height - 5 * age - 161;
            }
        }

        function calculateTDEE(profile) {
            const bmr = calculateBMR(profile);
            const activityMultipliers = {
                'sedentary': 1.2,
                'light': 1.375,
                'moderate': 1.55,
                'active': 1.725,
                'very-active': 1.9,
            };
            return bmr * activityMultipliers[profile.activityLevel];
        }

        function calculateCalorieTarget(profile) {
            const tdee = calculateTDEE(profile);
            switch (profile.goal) {
                case 'lose':
                    return Math.round(tdee - 500);
                case 'gain':
                    return Math.round(tdee + 300);
                default:
                    return Math.round(tdee);
            }
        }

        function calculateMacros(calorieTarget, goal) {
            let proteinPercent = 0.30;
            let carbsPercent = 0.40;
            let fatsPercent = 0.30;

            if (goal === 'lose') {
                proteinPercent = 0.35;
                carbsPercent = 0.35;
                fatsPercent = 0.30;
            } else if (goal === 'gain') {
                proteinPercent = 0.30;
                carbsPercent = 0.45;
                fatsPercent = 0.25;
            }

            return {
                protein: Math.round((calorieTarget * proteinPercent) / 4),
                carbs: Math.round((calorieTarget * carbsPercent) / 4),
                fats: Math.round((calorieTarget * fatsPercent) / 9),
            };
        }

        function calculateBMI(weight, height) {
            const heightInMeters = height / 100;
            return Number((weight / (heightInMeters * heightInMeters)).toFixed(1));
        }

        function getBMICategory(bmi) {
            if (bmi < 18.5) return 'Underweight';
            if (bmi < 25) return 'Normal weight';
            if (bmi < 30) return 'Overweight';
            return 'Obese';
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full ${type === 'success' ? 'bg-green-500' : 'bg-red-500'}"></div>
                    <p class="font-medium">${message}</p>
                </div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function navigateToPage(pageName) {
            const pages = {
                'dashboard': renderDashboard,
                'food-logger': renderFoodLogger,
                'profile': renderProfile,
                'fitness-plan': renderFitnessPlan,
                'diet-plan': renderDietPlan
            };

            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.dataset.page === pageName) {
                    link.classList.add('active');
                }
            });

            if (pages[pageName]) {
                pages[pageName]();
            }
        }

        function renderDashboard() {
            const profile = storage.getProfile();
            const mainContent = document.getElementById('main-content');

            if (!profile) {
                mainContent.innerHTML = `
                    <div class="max-w-2xl mx-auto">
                        <div class="card">
                            <h2 class="text-2xl font-bold mb-4">Welcome to FitTrack Pro!</h2>
                            <p class="text-gray-600 mb-4">Get started by setting up your profile to receive personalized fitness and nutrition recommendations.</p>
                            <a href="#profile" class="btn btn-primary">Create Your Profile</a>
                        </div>
                    </div>
                `;
                return;
            }

            const calorieTarget = calculateCalorieTarget(profile);
            const macros = calculateMacros(calorieTarget, profile.goal);
            const bmi = calculateBMI(profile.currentWeight, profile.height);
            const bmiCategory = getBMICategory(bmi);
            const todayLog = storage.getTodayLog();

            const todayCalories = todayLog?.totalCalories || 0;
            const todayProtein = todayLog?.totalProtein || 0;
            const todayCarbs = todayLog?.totalCarbs || 0;
            const todayFats = todayLog?.totalFats || 0;

            const calorieProgress = Math.min((todayCalories / calorieTarget) * 100, 100);
            const proteinProgress = Math.min((todayProtein / macros.protein) * 100, 100);
            const carbsProgress = Math.min((todayCarbs / macros.carbs) * 100, 100);
            const fatsProgress = Math.min((todayFats / macros.fats) * 100, 100);

            mainContent.innerHTML = `
                <div class="space-y-6">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-900">Welcome back, ${profile.name}!</h2>
                        <p class="text-gray-600">Here's your daily overview</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="card">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-600">Current Weight</p>
                                    <p class="text-2xl font-bold">${profile.currentWeight} kg</p>
                                </div>
                                <div class="text-blue-600 text-4xl">⚡</div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-600">Goal Weight</p>
                                    <p class="text-2xl font-bold">${profile.goalWeight} kg</p>
                                </div>
                                <div class="text-green-600 text-4xl">🎯</div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-600">BMI</p>
                                    <p class="text-2xl font-bold">${bmi}</p>
                                    <p class="text-xs text-gray-500">${bmiCategory}</p>
                                </div>
                                <div class="text-purple-600 text-4xl">📊</div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-600">Daily Calories</p>
                                    <p class="text-2xl font-bold">${calorieTarget}</p>
                                </div>
                                <div class="text-orange-600 text-4xl">🔥</div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h3 class="text-xl font-bold mb-6">Today's Nutrition</h3>
                        <div class="mb-6">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-sm font-medium">Calories</span>
                                <span class="text-sm text-gray-600">${todayCalories} / ${calorieTarget} kcal</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${calorieProgress}%"></div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-sm font-medium">Protein</span>
                                    <span class="text-sm text-gray-600">${todayProtein}g / ${macros.protein}g</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill bg-blue-500" style="width: ${proteinProgress}%"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-sm font-medium">Carbs</span>
                                    <span class="text-sm text-gray-600">${todayCarbs}g / ${macros.carbs}g</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill bg-green-500" style="width: ${carbsProgress}%"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-sm font-medium">Fats</span>
                                    <span class="text-sm text-gray-600">${todayFats}g / ${macros.fats}g</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill bg-yellow-500" style="width: ${fatsProgress}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <a href="#food-logger" class="card hover:shadow-lg transition-shadow cursor-pointer text-center">
                            <p class="font-medium">Log Food</p>
                            <p class="text-sm text-gray-600 mt-1">Track your meals</p>
                        </a>
                        <a href="#fitness-plan" class="card hover:shadow-lg transition-shadow cursor-pointer text-center">
                            <p class="font-medium">View Fitness Plan</p>
                            <p class="text-sm text-gray-600 mt-1">Your workout routine</p>
                        </a>
                        <a href="#diet-plan" class="card hover:shadow-lg transition-shadow cursor-pointer text-center">
                            <p class="font-medium">View Diet Plan</p>
                            <p class="text-sm text-gray-600 mt-1">Meal suggestions</p>
                        </a>
                    </div>
                </div>
            `;
        }

        function renderProfile() {
            const profile = storage.getProfile() || {
                name: '',
                age: 25,
                gender: 'male',
                currentWeight: 70,
                goalWeight: 65,
                height: 170,
                activityLevel: 'moderate',
                goal: 'maintain',
            };

            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <div class="max-w-2xl mx-auto">
                    <div class="card">
                        <h2 class="text-2xl font-bold mb-2">Your Profile</h2>
                        <p class="text-gray-600 mb-6">Set up your profile to get personalized fitness and nutrition recommendations</p>
                        
                        <form id="profile-form" class="space-y-6">
                            <div class="space-y-4">
                                <h3 class="font-semibold text-lg">Personal Information</h3>
                                
                                <div>
                                    <label class="block text-sm font-medium mb-1">Name</label>
                                    <input type="text" name="name" value="${profile.name}" class="input" required>
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-medium mb-1">Age</label>
                                        <input type="number" name="age" value="${profile.age}" min="15" max="100" class="input" required>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium mb-1">Gender</label>
                                        <select name="gender" class="input" required>
                                            <option value="male" ${profile.gender === 'male' ? 'selected' : ''}>Male</option>
                                            <option value="female" ${profile.gender === 'female' ? 'selected' : ''}>Female</option>
                                            <option value="other" ${profile.gender === 'other' ? 'selected' : ''}>Other</option>

        // Initialize app
        function initApp() {
            // Set up navigation
            const navLinks = document.querySelectorAll('a[href^="#"]');
            navLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const hash = link.getAttribute('href').substring(1);
                    navigateToPage(hash);
                });
            });

            // Handle initial route
            const initialPage = window.location.hash.substring(1) || 'dashboard';
            navigateToPage(initialPage);

            // Handle browser back/forward
            window.addEventListener('hashchange', () => {
                const page = window.location.hash.substring(1) || 'dashboard';
                navigateToPage(page);
            });
        }

        // Start the app
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
